# =============================================================================
# 生产环境配置（profile=prod）
# 密钥 / 地址必须由环境变量注入，禁止把真实密码写进仓库
# =============================================================================

spring:
  datasource:
    dynamic:
      datasource:
        master:
          # useSSL=true 建议生产开启；证书与网络策略按运维规范调整
          # openTelemetry=DISABLED：避免 Connector/J 9 + OTel 对每条连接做 reverse DNS 拖慢建池
          url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&connectTimeout=3000&socketTimeout=30000&openTelemetry=DISABLED
          username: ${DB_USER}
          password: ${DB_PASSWORD}
          driver-class-name: com.mysql.cj.jdbc.Driver
        # 从库；未配 DB_SLAVE_* 时与主库同址（单库部署）
        # 单库请删除本段或勿与 master 同址重复建池；真从库可加 lazy: true
        slave:
          url: jdbc:mysql://${DB_SLAVE_HOST:${DB_HOST}}:${DB_SLAVE_PORT:${DB_PORT:3306}}/${DB_SLAVE_NAME:${DB_NAME}}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&connectTimeout=3000&socketTimeout=30000&openTelemetry=DISABLED
          username: ${DB_SLAVE_USER:${DB_USER}}
          password: ${DB_SLAVE_PASSWORD:${DB_PASSWORD}}
          driver-class-name: com.mysql.cj.jdbc.Driver
      # 公共配置使用 Druid，生产参数也必须写在 dynamic.druid 下
      druid:
        max-active: ${DRUID_MAX_ACTIVE:20}
        min-idle: ${DRUID_MIN_IDLE:5}
        max-wait: ${DRUID_MAX_WAIT:3000}
        stat-view-servlet:
          # 生产默认关闭；确需使用时显式开启，并通过反向代理/防火墙限制内网访问
          enabled: ${DRUID_ENABLED:false}
          # 默认仅本机可访问，支持逗号分隔 IP/CIDR，例如 10.0.0.0/8
          allow: ${DRUID_ALLOW:127.0.0.1}
          login-username: ${DRUID_USERNAME:druid}
          # 未配置时使用每次启动生成的随机值，避免弱口令意外开放
          login-password: ${DRUID_PASSWORD:${random.uuid}}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # 与开发对齐时可设 REDIS_DB=1（见 application-dev.yml）
      database: ${REDIS_DB:0}
      # 与公共配置一致：命令超时，避免 VT 堆积
      timeout: 2s

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

# 生产关闭 OpenAPI 文档与 Swagger UI
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

omni:
  security:
    # 部署自定义 admin 初始密码（环境变量）；仅当仍为演示口令时写入
    bootstrap-admin-password: ${OMNI_ADMIN_INITIAL_PASSWORD}
    jwt:
      # 无默认值：生产缺少密钥时拒绝启动，至少 32 字节
      secret: ${OMNI_JWT_SECRET}
    sign:
      secret: ${OMNI_SIGN_SECRET}
    # 生产站点 CORS：填浏览器 Origin（含协议）或裸域名；多个逗号分隔
    # 只配 http 也会自动放行同 host 的 https（反之亦然）
    # 例：OMNI_CORS_ORIGINS=https://omni-scaffolding.irez.cn
    # 例：OMNI_CORS_ORIGINS=omni-scaffolding.irez.cn
    cors:
      allowed-origin-patterns:
        - ${OMNI_CORS_ORIGINS}
    # 覆盖公共白名单：生产不匿名开放 Swagger、Prometheus 和 metrics
    # Druid 自带登录与 IP 白名单；默认关闭，开启后仍需由内网反向代理限制入口
    permit-all:
      - /api/auth/login
      - /api/auth/captcha
      - /actuator/health/**
      - /actuator/info
      - /druid/**
      - /api/system/files/*/content

logging:
  level:
    # 生产默认收敛日志量；业务包保留 INFO
    root: WARN
    com.omni.scaffolding: INFO
    org.flywaydb.core.internal.sqlscript.DefaultSqlScriptExecutor: ERROR
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR
