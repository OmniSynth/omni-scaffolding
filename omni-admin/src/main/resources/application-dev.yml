# =============================================================================
# 开发环境配置（profile=dev）
# 敏感信息可用环境变量覆盖：DB_* / DB_SLAVE_* / REDIS_*
# =============================================================================

spring:
  datasource:
    dynamic:
      datasource:
        # 写库（主）
        master:
          url: jdbc:mysql://${DB_HOST:192.168.3.10}:${DB_PORT:40785}/${DB_NAME:omni-scaffolding}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          username: ${DB_USER:root}
          password: ${DB_PASSWORD:SgQHvsy9M7LWKBCz}
          driver-class-name: com.mysql.cj.jdbc.Driver
        # 读库（从）；未配 DB_SLAVE_* 时与主库相同，单库可直接启动
        slave:
          url: jdbc:mysql://${DB_SLAVE_HOST:${DB_HOST:192.168.3.10}}:${DB_SLAVE_PORT:${DB_PORT:40785}}/${DB_SLAVE_NAME:${DB_NAME:omni-scaffolding}}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          username: ${DB_SLAVE_USER:${DB_USER:root}}
          password: ${DB_SLAVE_PASSWORD:${DB_PASSWORD:SgQHvsy9M7LWKBCz}}
          driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:192.168.3.10}
      port: ${REDIS_PORT:40782}
      password: ${REDIS_PASSWORD:123456}
      # Redis 逻辑库索引（0~15）
      database: ${REDIS_DB:1}

  jpa:
    # 开发环境打印 SQL，便于对照双轨持久化
    show-sql: true
    hibernate:
      # 仅校验，不自动改表；Schema 变更走 Flyway
      ddl-auto: validate

  # Kafka Broker（仅 omni.kafka.enabled=true 时连接）
  kafka:
    bootstrap-servers: ${KAFKA_HOSTS:192.168.6.80}:${KAFKA_PORT:9092}


logging:
  level:
    com.omni.scaffolding: DEBUG
    org.hibernate.SQL: DEBUG
    com.baomidou.mybatisplus: DEBUG
    com.baomidou.dynamic: DEBUG
