services:
  mysql:
    image: mysql:8.4
    container_name: omni-mysql
    environment:
      MYSQL_DATABASE: omni
      MYSQL_USER: ${DB_USER:-omni}
      MYSQL_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}"
    ports:
      - "127.0.0.1:3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - omni-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: omni-redis
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
    command: sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 可选：docker compose --profile kafka up -d
  kafka:
    profiles: ["kafka"]
    image: bitnami/kafka:3.9
    container_name: omni-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # 可选：docker compose --profile elasticsearch up -d
  elasticsearch:
    profiles: ["elasticsearch"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: omni-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: omni-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: omni
      DB_USER: ${DB_USER:-omni}
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
      OMNI_JWT_SECRET: "${OMNI_JWT_SECRET:?Set OMNI_JWT_SECRET in .env}"
      OMNI_SIGN_SECRET: "${OMNI_SIGN_SECRET:?Set OMNI_SIGN_SECRET in .env}"
      OMNI_ADMIN_INITIAL_PASSWORD: "${OMNI_ADMIN_INITIAL_PASSWORD:?Set OMNI_ADMIN_INITIAL_PASSWORD in .env}"
      DRUID_ENABLED: ${DRUID_ENABLED:-false}
      DRUID_ALLOW: ${DRUID_ALLOW:-127.0.0.1}
      DRUID_USERNAME: ${DRUID_USERNAME:-druid}
      DRUID_PASSWORD: "${DRUID_PASSWORD:?Set DRUID_PASSWORD in .env}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  omni-mysql-data:
